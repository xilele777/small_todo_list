<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TodoList</title>
  <link rel="stylesheet" href="css.css">
</head>

<body>
  <div class="wrapper">
    <h1>今日待办</h1>
    <div class="count">
      <span>总任务数：<span class="sum">0</span></span>
      <span>已完成任务数：<span class="done">0</span></span>
      <span>进度：<span class="progress">0%</span></span>
    </div>
    <form action="" class="form">
      <input type="text" class="input" placeholder="请输入您的任务">
      <ul class="item"></ul>
      <small>提示：左键点击表示完成，右键点击表示删除该任务！</small>
    </form>
  </div>
  <script src="./script.js"></script>
</body>

</html>
